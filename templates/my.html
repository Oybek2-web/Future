<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Mening navbatim</title>
</head>
<body>

<h2>Mening navbatlarim</h2>
<div id="list"></div>

<script>
fetch("http://127.0.0.1:8000/queue/my/", {
  headers: {
    "Authorization": "Token YOUR_TOKEN"
  }
})
.then(res => res.json())
.then(data => {
  const list = document.getElementById("list");

  data.forEach(q => {
    const div = document.createElement("div");
    div.innerHTML = `
      <p>Service: ${q.service.name}</p>
      <p>Number: ${q.number}</p>
      <p>Status: ${q.status}</p>
      <hr>
    `;
    list.appendChild(div);
  });
});
</script>

</body>
</html>
