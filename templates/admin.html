<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Admin panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<button onclick="nextUser()">Next</button>

<div id="list"></div>

<script>
function loadQueues() {
  fetch("http://127.0.0.1:8000/queue/list/")
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      data.forEach(q => {
        const div = document.createElement("div");
        div.innerHTML = `
          <p>${q.service.name} - #${q.number} (${q.status})</p>
          <hr>
        `;
        list.appendChild(div);
      });
    });
}

function nextUser() {
  fetch("http://127.0.0.1:8000/queue/next/", {
    method: "POST"
  }).then(() => loadQueues());
}

loadQueues();
</script>

</body>
</html>
